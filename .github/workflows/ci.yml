name: Jarvis RTOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Toolchain and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          nasm \
          xorriso \
          mtools \
          grub-pc-bin \
          grub-common \
          qemu-system-x86_64 \
          ovmf \
          expect \
          wget

    - name: Setup cross-compiler symlinks
      run: |
        sudo ln -sf /usr/bin/gcc /usr/local/bin/x86_64-elf-gcc
        sudo ln -sf /usr/bin/g++ /usr/local/bin/x86_64-elf-g++
        sudo ln -sf /usr/bin/ld /usr/local/bin/x86_64-elf-ld
        sudo ln -sf /usr/bin/ar /usr/local/bin/x86_64-elf-ar
        sudo ln -sf /usr/bin/objcopy /usr/local/bin/x86_64-elf-objcopy

    - name: Verify cross-compiler
      run: x86_64-elf-gcc --version

    - name: Install Renode (Linux portable)
      run: |
        mkdir -p /tmp/renode
        wget -qO- https://builds.renode.io/renode-latest.linux-portable.tar.gz | \
          tar xz -C /tmp/renode --strip-components=1
        echo "/tmp/renode" >> $GITHUB_PATH

    - name: Verify Renode Installation
      run: |
        renode --version
        echo "Renode OK"

    - name: Validate Renode Platform Descriptions
      run: |
        for arch in x86_64 aarch64 riscv64; do
          echo "=== Loading platform: ${arch} ==="
          renode --batch --disable-xwt -e "i @tools/renode/jarvis-${arch}.resc; q" 2>&1 || true
          echo ""
        done
        echo "Renode platform validation complete"

    - name: Build Kernel (x86_64 Debug)
      run: |
        make debug QEMU_UEFI=/usr/share/ovmf/OVMF.fd

    - name: Run Automated Test Suite (selftest — CI gate)
      run: |
        timeout 360 make execute-test x86 debug selftest \
          QEMU_UEFI=/usr/share/ovmf/OVMF.fd

    - name: Run Full Test Suite (all classes)
      if: success()
      run: |
        timeout 360 make execute-test x86 debug all \
          QEMU_UEFI=/usr/share/ovmf/OVMF.fd
