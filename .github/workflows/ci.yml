name: Jarvis RTOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Toolchain and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc \
          clang \
          lld \
          nasm \
          xorriso \
          grub-pc-bin \
          grub-common \
          qemu-system-x86 \
          ovmf \
          expect

    - name: Build Kernel (x86_64 Debug)
      run: |
        make debug \
          ARCH=x86_64 \
          CC=gcc \
          CXX=clang++ \
          LD=ld \
          AR=ar \
          OBJCOPY=objcopy \
          QEMU_UEFI=/usr/share/ovmf/OVMF.fd

    - name: Run Automated Test Suite
      run: |
        timeout 90 make test-qemu \
          ARCH=x86_64 \
          QEMU_UEFI=/usr/share/ovmf/OVMF.fd

    - name: Verify Test Result
      run: |
        echo "Build and test completed for x86_64."
