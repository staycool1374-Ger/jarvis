name: Jarvis RTOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Toolchain and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc \
          clang \
          lld \
          nasm \
          xorriso \
          mtools \
          grub-pc-bin \
          grub-common \
          qemu-system-x86 \
          ovmf \
          expect \
          wget

    - name: Install Renode (Linux portable)
      run: |
        mkdir -p /tmp/renode
        wget -qO- https://builds.renode.io/renode-latest.linux-portable.tar.gz | \
          tar xz -C /tmp/renode --strip-components=1
        echo "/tmp/renode" >> $GITHUB_PATH

    - name: Verify Renode Installation
      run: |
        renode --version
        echo "Renode OK"

    - name: Validate Renode Platform Descriptions
      run: |
        for arch in x86_64 aarch64 riscv64; do
          echo "=== Loading platform: ${arch} ==="
          renode --batch --disable-xwt -e "i @tools/renode/jarvis-${arch}.resc; q" 2>&1 || true
          echo ""
        done
        echo "Renode platform validation complete"

    - name: Build Kernel (x86_64 Debug)
      run: |
        make debug \
          ARCH=x86_64 \
          CC=gcc \
          CXX=clang++ \
          LD=ld \
          AR=ar \
          OBJCOPY=objcopy \
          QEMU_UEFI=/usr/share/ovmf/OVMF.fd

    - name: Run Automated Test Suite (selftest — CI gate)
      run: |
        # Host-side watchdog monitors serial log growth to detect hangs the
        # in-kernel watchdog cannot catch (interrupts disabled during test exec).
        # Makefile's _run_test_qemu includes both the watchdog and a 120s expect
        # timeout.  CI-level safety net (6 min) catches unexpected QEMU stalls.
        timeout 360 make test-selftest \
          ARCH=x86_64 \
          QEMU_UEFI=/usr/share/ovmf/OVMF.fd

    - name: Run Full Test Suite (all classes)
      if: success()
      run: |
        timeout 360 make test-all-debug \
          ARCH=x86_64 \
          QEMU_UEFI=/usr/share/ovmf/OVMF.fd
